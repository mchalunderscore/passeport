name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  dmg:
    name: Build + attach unsigned DMG
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Install universal Rust targets
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Extract version from tag
        id: release
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Verify tag matches app version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          APP_VERSION="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' Resources/Info.plist)"
          if [ "$TAG_VERSION" != "$APP_VERSION" ]; then
            echo "Release tag $GITHUB_REF_NAME does not match app version $APP_VERSION" >&2
            exit 1
          fi

      - name: Build DMG
        run: |
          scripts/make-dmg.sh

      - name: Rename artifacts
        run: |
          VERSION="${{ steps.release.outputs.version }}"
          mv dist/Passeport.dmg "dist/Passeport-$VERSION.dmg"
          shasum -a 256 "dist/Passeport-$VERSION.dmg" > "dist/Passeport-$VERSION.dmg.sha256"

      - name: Verify universal Mach-O slices
        run: |
          APP="dist/Passeport.app"
          test "$(lipo -archs "$APP/Contents/MacOS/Passeport")" = "x86_64 arm64" || \
            test "$(lipo -archs "$APP/Contents/MacOS/Passeport")" = "arm64 x86_64"
          test "$(lipo -archs "$APP/Contents/Helpers/passeport-core")" = "x86_64 arm64" || \
            test "$(lipo -archs "$APP/Contents/Helpers/passeport-core")" = "arm64 x86_64"

      - name: Attach release artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/Passeport-${{ steps.release.outputs.version }}.dmg
            dist/Passeport-${{ steps.release.outputs.version }}.dmg.sha256
          fail_on_unmatched_files: true
