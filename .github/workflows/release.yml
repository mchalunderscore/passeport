name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  dmg:
    name: Build + attach unsigned DMG
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: release
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build DMG
        run: |
          scripts/make-dmg.sh

      - name: Rename artifacts
        run: |
          VERSION="${{ steps.release.outputs.version }}"
          mv dist/Passeport.dmg "dist/Passeport-$VERSION.dmg"
          shasum -a 256 "dist/Passeport-$VERSION.dmg" > "dist/Passeport-$VERSION.dmg.sha256"

      - name: Attach release artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/Passeport-${{ steps.release.outputs.version }}.dmg
            dist/Passeport-${{ steps.release.outputs.version }}.dmg.sha256
          fail_on_unmatched_files: true
